name: Daily Articles Fetch

on:
  schedule:
    - cron: '30 6 * * *'   # 12:30 AM CST (UTC-6) / 1:30 AM CDT (UTC-5)
  workflow_dispatch:

jobs:
  fetch_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel article refresh
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://goodnews-phi.vercel.app/api/cron/refresh?replace=1")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron refresh failed with status $HTTP_CODE"
            exit 1
          fi
