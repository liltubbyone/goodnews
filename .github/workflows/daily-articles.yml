name: Daily Articles Fetch

on:
  schedule:
    - cron: '15 6 * * *'  # Runs daily at 12:15 AM CST (6:15 AM UTC)
  workflow_dispatch:

jobs:
  fetch_articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch articles from News Data API
        run: |
          curl -X GET 'https://newsdata.io/api/1/news?apikey=pub_eae24b22627b43a28d515ea2dc1f33e1&limit=50&country=us' \
          -H 'Accept: application/json' \
          -o articles.json

      - name: Create public directory and move file
        run: |
          mkdir -p public
          mv articles.json public/articles.json

      - name: Commit and push changes
        run: |
          git config --local user.email 'github-actions@github.com'
          git config --local user.name 'GitHub Actions'
          git add public/articles.json
          git commit -m 'chore: update articles from News Data API'
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
